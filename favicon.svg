Cartella per documenti scaricabili o linkabili dal sito.

Tipico contenuto:
- cv.pdf            → il tuo curriculum (già linkato dalla sezione CV)
- portfolio.pdf     → eventuale portfolio esteso
- presentazione.pdf → slide o materiali
- qualsiasi altro file (PDF, immagini, archivi zip…) che vuoi rendere
  accessibile tramite link diretto dal sito

Per linkare un file da index.html basta usare il percorso:
    assets/file/nome-del-file.pdf

Esempio:
    <a href="assets/file/portfolio.pdf" download>Scarica il portfolio</a>

Se rinomini cv.pdf, ricordati di aggiornare i due link nella sezione CV
di index.html (cerca "assets/file/cv.pdf").
